<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체육관 예약 시스템</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "맑은 고딕", sans-serif;
}

body {
    background-color: #f4f6f9;
    padding: 30px;
}

.container {
    max-width: 800px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #1e3a8a;
    margin-bottom: 10px;
}

.date {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
}

.time-card {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.time-info h3 {
    color: #111;
    margin-bottom: 5px;
}

.available {
    color: green;
    font-weight: bold;
}

.booked {
    color: red;
    font-weight: bold;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

.disabled {
    background: gray;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="container">

    <h1>🏀 체육관 예약 시스템</h1>
    <p class="date">2026-06-17</p>

    <div class="time-card">
        <div class="time-info">
            <h3>08:00 ~ 09:00</h3>
            <p class="available">예약 가능</p>
        </div>
        <button>예약하기</button>
    </div>

    <div class="time-card">
        <div class="time-info">
            <h3>09:00 ~ 10:00</h3>
            <p class="booked">예약 완료</p>
        </div>
        <button class="disabled" disabled>예약 불가</button>
    </div>

    <div class="time-card">
        <div class="time-info">
            <h3>10:00 ~ 11:00</h3>
            <p class="available">예약 가능</p>
        </div>
        <button>예약하기</button>
    </div>

    <div class="time-card">
        <div class="time-info">
            <h3>11:00 ~ 12:00</h3>
            <p class="available">예약 가능</p>
        </div>
        <button>예약하기</button>
    </div>

    <div class="time-card">
        <div class="time-info">
            <h3>13:00 ~ 14:00</h3>
            <p class="available">예약 가능</p>
        </div>
        <button>예약하기</button>
    </div>

    <div class="time-card">
        <div class="time-info">
            <h3>14:00 ~ 15:00</h3>
            <p class="booked">예약 완료</p>
        </div>
        <button class="disabled" disabled>예약 불가</button>
    </div>

</div>

</body>
</html>
